spring.application.name=banking-app

# ─── Database ─────────────────────────────────────────────────────────────────
# Update credentials before running
spring.datasource.url=jdbc:mysql://localhost:3306/banking_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── Jackson ──────────────────────────────────────────────────────────────────
# Serialize LocalDateTime as ISO-8601 string, not array
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080
