server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the Spring Boot backend container
    location ~ ^/(login|logout|user|transaction|api) {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Forward cookies so Spring Security session works
        proxy_cookie_path  /  /;
        proxy_buffering    off;
    }

    # Angular SPA — serve index.html for all client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
