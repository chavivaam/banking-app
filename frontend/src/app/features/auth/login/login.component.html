<div class="login-shell">
  <mat-card class="login-card">
    <mat-card-header>
      <div mat-card-avatar class="brand-avatar">
        <mat-icon>account_balance</mat-icon>
      </div>
      <mat-card-title>Banking Portal</mat-card-title>
      <mat-card-subtitle>Sign in to your account</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <mat-icon matPrefix class="field-icon">person</mat-icon>
          <input matInput formControlName="username" autocomplete="username" />
          <mat-error *ngIf="form.get('username')?.hasError('required')">Username is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix class="field-icon">lock</mat-icon>
          <input matInput formControlName="password"
                 [type]="hidePassword ? 'password' : 'text'"
                 autocomplete="current-password" />
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword"
                  [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
        </mat-form-field>

        <div *ngIf="error" class="error-banner">
          <mat-icon>error_outline</mat-icon>
          <span>{{ error }}</span>
        </div>

        <button mat-flat-button color="primary" class="full-width submit-btn" type="submit" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="20" class="btn-spinner"></mat-spinner>
          {{ loading ? 'Signing in…' : 'Sign In' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
