<mat-card class="form-card">
  <mat-card-header class="card-header-toggle" (click)="collapsed = !collapsed">
    <mat-card-title>
      <mat-icon>person_add</mat-icon>
      Add New User
    </mat-card-title>
    <mat-icon class="toggle-icon" [class.rotated]="!collapsed">expand_more</mat-icon>
  </mat-card-header>

  <mat-card-content *ngIf="!collapsed">
    <form [formGroup]="form" (ngSubmit)="submit()">

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Username</mat-label>
        <mat-icon matPrefix class="field-icon">person</mat-icon>
        <input matInput formControlName="userName" autocomplete="off" />
        <mat-error *ngIf="form.get('userName')?.hasError('required')">Username is required</mat-error>
        <mat-error *ngIf="form.get('userName')?.hasError('minlength')">Minimum 3 characters</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <mat-icon matPrefix class="field-icon">lock</mat-icon>
        <input matInput [type]="hidePassword ? 'password' : 'text'"
               formControlName="password" autocomplete="new-password" />
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword; $event.stopPropagation()"
                [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
        <mat-error *ngIf="form.get('password')?.hasError('minlength')">Minimum 6 characters</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Role</mat-label>
        <mat-select formControlName="role">
          <mat-option value="USER">
            <mat-icon class="opt-icon">person</mat-icon>
            User
          </mat-option>
          <mat-option value="ADMIN">
            <mat-icon class="opt-icon">admin_panel_settings</mat-icon>
            Admin
          </mat-option>
        </mat-select>
        <mat-error>Role is required</mat-error>
      </mat-form-field>

      <button mat-flat-button color="primary" class="full-width submit-btn" type="submit"
              [disabled]="loading || form.invalid">
        <mat-icon *ngIf="!loading">person_add</mat-icon>
        {{ loading ? 'Creating…' : 'Create User' }}
      </button>
    </form>
  </mat-card-content>
</mat-card>
