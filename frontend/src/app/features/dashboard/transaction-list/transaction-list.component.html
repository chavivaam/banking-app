<mat-card class="list-card">
  <mat-card-header>
    <mat-card-title>
      <mat-icon>receipt_long</mat-icon>
      Transactions
    </mat-card-title>
    <span class="tx-count">{{ dataSource.length }} total</span>
  </mat-card-header>

  <mat-card-content>
    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSort($event)" class="tx-table">

        <!-- Username column (ADMIN only) -->
        <ng-container matColumnDef="username">
          <th mat-header-cell *matHeaderCellDef>User</th>
          <td mat-cell *matCellDef="let tx">{{ tx.username }}</td>
        </ng-container>

        <!-- Date column -->
        <ng-container matColumnDef="createdDate">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
          <td mat-cell *matCellDef="let tx" class="date-cell">{{ tx.createdDate | date:'MMM d, y, h:mm a' }}</td>
        </ng-container>

        <!-- Type chip column -->
        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef>Type</th>
          <td mat-cell *matCellDef="let tx">
            <span [class]="'type-chip type-' + tx.type.toLowerCase()">{{ tx.type }}</span>
          </td>
        </ng-container>

        <!-- Amount column -->
        <ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Amount</th>
          <td mat-cell *matCellDef="let tx"
              [class.credit-amount]="tx.type === 'CREDIT'"
              [class.debit-amount]="tx.type === 'DEBIT'">
            {{ tx.type === 'CREDIT' ? '+' : '-' }}{{ tx.amount | currency }}
          </td>
        </ng-container>

        <!-- Description column -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let tx" class="desc-cell">{{ tx.description }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="tx-row"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td [attr.colspan]="displayedColumns.length">
            <div class="empty-state">
              <mat-icon>inbox</mat-icon>
              <p>No transactions yet.</p>
            </div>
          </td>
        </tr>
      </table>
    </div>
  </mat-card-content>
</mat-card>
